services:
  db:
    image: mysql:8.0
    container_name: expense_db
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "${DB_PORT}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  db_test:
    image: mysql:8.0
    container_name: expense_db_test
    environment:
      MYSQL_DATABASE: ${DB_NAME}_test
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "${DB_TEST_PORT}:3306"

  api:
    build: ./api
    container_name: expense_api
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/app
    ports:
      - "${API_PORT}:80"
    environment:
      SERVER_NAME: ":80"
      CADDY_GLOBAL_OPTIONS: "local_certs"

  frontend:
    image: node:20-alpine
    container_name: expense_front
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONT_PORT}:3000"
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"

  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    ports:
     - "8025:8025"
     - "1025:1025"
    environment:
      MP_MAX_MESSAGES: 500