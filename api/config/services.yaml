# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Auth\Service\LoginRateLimiter:
        arguments:
            $loginLimiter: '@limiter.login'

    App\Auth\Service\PasswordResetRateLimiter:
        arguments:
            $passwordResetLimiter: '@limiter.password_reset'

    App\Auth\Factory\CookieFactory:
        arguments:
            - '%env(bool:AUTH_COOKIE_SECURE)%'

    App\Auth\Security\CookieTokenExtractor: ~

    app.jwt_cookie_authenticator:
        class: App\Auth\Security\CookieJWTAuthenticator
        parent: lexik_jwt_authentication.security.jwt_authenticator

    App\Auth\Mailer\PasswordResetCodeMailerInterface:
        alias: App\Auth\Mailer\SymfonyPasswordResetCodeMailer

    App\Auth\Mailer\SymfonyPasswordResetCodeMailer:
        arguments:
            $fromEmail: '%env(MAILER_FROM)%'

    App\Analytics\Repository\BudgetExpenseReaderInterface:
        alias: App\Analytics\Repository\TransactionAnalyticsRepository