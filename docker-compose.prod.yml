services:
  db:
    image: mysql:8.0
    container_name: expense_prod_db
    restart: unless-stopped
    command: >
      --performance-schema=OFF
      --innodb-buffer-pool-size=64M
      --max-connections=20
      --table-open-cache=200
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${DB_ROOT_PASSWORD}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    container_name: expense_prod_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_SECRET: ${APP_SECRET}

      SERVER_NAME: ":80"

      DATABASE_URL: mysql://${DB_USER}:${DB_PASSWORD}@db:3306/${DB_NAME}?serverVersion=8.0.36&charset=utf8mb4

      JWT_SECRET_KEY: /app/config/jwt/private.pem
      JWT_PUBLIC_KEY: /app/config/jwt/public.pem
      JWT_PASSPHRASE: ${JWT_PASSPHRASE}

      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE}

      MAILER_DSN: ${MAILER_DSN}
      MAILER_FROM: ${MAILER_FROM}

      LOCK_DSN: flock
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-0}
    volumes:
      - jwt_keys:/app/config/jwt

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_API_TIMEOUT_MS: ${VITE_API_TIMEOUT_MS:-10000}
    container_name: expense_prod_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  mysql_data:
  jwt_keys: